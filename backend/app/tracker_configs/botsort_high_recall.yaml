# Ultralytics BoT-SORT tuned for wide amateur football footage.
# Far-side players are small and often score below the default 0.25 new-track threshold.
tracker_type: botsort
track_high_thresh: 0.10
track_low_thresh: 0.03
new_track_thresh: 0.08
track_buffer: 45
match_thresh: 0.75
fuse_score: True
gmc_method: sparseOptFlow
proximity_thresh: 0.5
appearance_thresh: 0.25
with_reid: False
